server:
  port: 8080

spring:
  application:
    name: API-GATEWAY

  cloud:
    gateway:
      server:
        webflux:
          routes:
            - id: user-service
              uri: lb://USER-SERVICE
              predicates:
                - Path=/users/**

            - id: trade-service
              uri: lb://TRADE-SERVICE
              predicates:
                - Path=/trades/**

            - id: settlement-service
              uri: lb://SETTLEMENT-SERVICE
              predicates:
                - Path=/settlements/**
eureka:
  instance:
    ip-address: 127.0.0.1
    prefer-ip-address: true

  client:
    service-url:
      defaultZone: http://localhost:8761/eureka

logging:
  level:
    org.springframework.cloud.gateway: DEBUG
    org.springframework.cloud.loadbalancer: TRACE
<div class="header text-center m-4">
  <h1>Trade List</h1>
</div>
<div class="mat-elevation-z8">
  <table mat-table [dataSource]="dataSource">
    <!-- Position Column -->
    <ng-container matColumnDef="tradeId">
      <th mat-header-cell *matHeaderCellDef>Trade ID</th>
      <td mat-cell *matCellDef="let element">{{element.tradeId}}</td>
    </ng-container>

    <!-- Name Column -->
    <ng-container matColumnDef="buyer">
      <th mat-header-cell *matHeaderCellDef>Buyer</th>
      <td mat-cell *matCellDef="let element">{{element.buyer.userName}}</td>
    </ng-container>

    <!-- Weight Column -->
    <ng-container matColumnDef="seller">
      <th mat-header-cell *matHeaderCellDef>Seller</th>
      <td mat-cell *matCellDef="let element">{{element.seller.userName}}</td>
    </ng-container>

    <!-- Symbol Column -->
    <ng-container matColumnDef="amount">
      <th mat-header-cell *matHeaderCellDef>Amount</th>
      <td mat-cell *matCellDef="let element">{{element.amount}}</td>
    </ng-container>

    <ng-container matColumnDef="shares">
      <th mat-header-cell *matHeaderCellDef>Shares</th>
      <td mat-cell *matCellDef="let element">{{element.shares}}</td>
    </ng-container>

    <ng-container matColumnDef="timestamp">
      <th mat-header-cell *matHeaderCellDef>Timestamp</th>
      <td mat-cell *matCellDef="let element">{{element.timestamp}}</td>
    </ng-container>
    <ng-container matColumnDef="status">
      <th mat-header-cell *matHeaderCellDef>Status</th>
      <td mat-cell *matCellDef="let element">{{element.status}}</td>
    </ng-container>
    <ng-container matColumnDef="Button">
      <th mat-header-cell *matHeaderCellDef>Button</th>
      <td mat-cell *matCellDef="let element">
        <button
          [disabled]="element.status === 'SETTLED'"
          [style.backgroundColor]="element.status === 'SETTLED' ? 'green' : 'orange'"
          (click)="settleTrade(element.tradeId)"
        >
          {{ element.status === 'SETTLED' ? 'Settled' : 'Settle' }}
        </button>
      </td>
    </ng-container>
    <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
    <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
  </table>

  <mat-paginator
    [pageSizeOptions]="[5, 10, 20]"
    showFirstLastButtons
    aria-label="Select page of periodic elements"
  >
  </mat-paginator>
</div>

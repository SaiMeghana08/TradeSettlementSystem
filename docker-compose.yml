services:
  mysql:
    image: mysql:8.0
    container_name: mysql

    environment:
      MYSQL_ROOT_PASSWORD: Megha@703

    ports:
      - "3308:3306"

    volumes:
      - mysql-data:/var/lib/mysql
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql

    healthcheck:
      test: ["CMD","mysqladmin","ping","-h","localhost","-pMegha@703"]
      interval: 10s
      timeout: 5s
      retries: 10

  eureka-server:
    build:
      context: ./Server

    container_name: eureka-server

    ports:
      - "8761:8761"

    healthcheck:
      test: ["CMD-SHELL","wget --spider -q http://localhost:8761 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10

    restart: always

  api-gateway:
    build:
      context: ./gatewayService

    container_name: api-gateway

    ports:
      - "8080:8080"

    environment:
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka-server:8761/eureka

    depends_on:
      eureka-server:
        condition: service_healthy

    restart: always

  trade-service:
    build:
      context: ./TradeService

    container_name: trade-service

    ports:
      - "8082:8082"

    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/tradeDB
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: Megha@703
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka-server:8761/eureka

    depends_on:
      mysql:
        condition: service_healthy
      eureka-server:
        condition: service_healthy

    restart: always

  user-service:
    build:
      context: ./UserService

    container_name: user-service

    ports:
      - "8081:8081"

    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/userDB
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: Megha@703
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka-server:8761/eureka

    depends_on:
      mysql:
        condition: service_healthy
      eureka-server:
        condition: service_healthy

    restart: always

  settlement-service:
    build:
      context: ./SettelemtService1

    container_name: settlement-service

    ports:
      - "8083:8083"

    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/settlementDB
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: Megha@703
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka-server:8761/eureka

    depends_on:
      mysql:
        condition: service_healthy
      eureka-server:
        condition: service_healthy

    restart: always

  frontend:
    build:
      context: ./tradeComponent

    container_name: trade-frontend

    ports:
      - "4200:4200"

    depends_on:
      - api-gateway

    restart: always

volumes:
  mysql-data: